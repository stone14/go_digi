  #     DB_PASSWORD: digicap_password_change_me
  #     DB_NAME: digicap
  #     JWT_SECRET: change-this-to-a-long-random-secret
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

  # ── 분리 배포: Next.js 프론트만 ──
  # web:
